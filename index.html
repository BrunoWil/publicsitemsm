<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSM Advogados</title>
    <base href="/publicsitemsm/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:         #b8965a;
            --gold-light:   #d4af7a;
            --gold-dark:    #8a6e3e;
            --ink:          #0d0d0d;
            --ink-muted:    #4a4a4a;
            --ink-faint:    #9a9a9a;
            --white:        #ffffff;
            --parchment:    #f8f6f1;
            --parchment2:   #f0ede4;
            --hairline:     #e5e0d5;
            --radius:       14px;
            --radius-sm:    8px;

            /* Compat aliases usados pelo Yew */
            --colors-primary:        var(--gold);
            --colors-primary-focus:  var(--gold-dark);
            --colors-canvas:         var(--white);
            --colors-canvas-parchment: var(--parchment);
            --colors-surface-black:  var(--ink);
            --colors-ink:            var(--ink);
            --colors-on-dark:        var(--white);
            --colors-hairline:       var(--hairline);
            --colors-ink-muted-80:   var(--ink-muted);
            --colors-ink-muted-48:   var(--ink-faint);

            --font-display: 'Playfair Display', serif;
            --font-text:    'Inter', sans-serif;
            --font-lead:    'Cormorant Garamond', serif;

            --spacing-section: 72px;
            --spacing-lg:      24px;
            --rounded-lg:      14px;
            --rounded-pill:    9999px;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 54px;
        }

        body {
            font-family: var(--font-text);
            background: var(--white);
            color: var(--ink);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-top: 54px;
        }

        /* ── NAV ── */
        .nav {
            background: rgba(248, 246, 241, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 24px;
            height: 54px;
            border-bottom: 0.5px solid var(--hairline);
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 9999;
        }
        .nav-content {
            width: 100%;
            max-width: 1080px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-nav-brand {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--ink);
            text-decoration: none;
        }
        .main-nav-links {
            display: flex;
            gap: 22px;
            align-items: center;
        }
        .main-nav-links a.text-link {
            font-family: var(--font-text);
            font-size: 11px;
            letter-spacing: 0.8px;
            color: var(--ink-muted);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .main-nav-links a.text-link:hover { color: var(--ink); }
        .nav-pill {
            background: var(--gold);
            color: var(--white);
            padding: 6px 16px;
            border-radius: var(--rounded-pill);
            font-family: var(--font-text);
            font-size: 11px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s;
        }
        .nav-pill:hover { background: var(--gold-dark); }

        /* ── HERO ── */
        .hero {
            background-color: var(--ink);
            background-size: cover;
            background-position: center;
            min-height: 62vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 24px 72px;
            position: relative;
            overflow: hidden;
        }
        /* escurece a imagem de fundo para o texto ficar legível */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.62);
            z-index: 0;
        }
        .hero > * { position: relative; z-index: 1; }
        .hero-orb {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(184, 150, 90, 0.18) 0%, transparent 65%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            animation: pulseOrb 5s ease-in-out infinite;
        }
        .hero-eyebrow {
            font-family: var(--font-text);
            font-size: 10px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            animation: fadeUp 0.5s ease both;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: 52px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.08;
            letter-spacing: -0.5px;
            margin: 0 0 18px 0;
            animation: fadeUp 0.6s 0.1s ease both;
        }
        .hero-sub {
            font-family: var(--font-lead);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.72);
            max-width: 500px;
            margin: 0 auto 36px;
            line-height: 1.65;
            animation: fadeUp 0.6s 0.2s ease both;
        }
        .hero-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        /* ── STATS STRIP ── */
        .stats-strip {
            background: var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 28px 40px;
        }
        .stat { text-align: center; }
        .stat-val {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            line-height: 1;
        }
        .stat-lbl {
            font-family: var(--font-text);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.72);
            margin-top: 5px;
        }

        /* ── SECTION HELPERS ── */
        .section-header { text-align: center; margin-bottom: 36px; }
        .section-eyebrow {
            font-family: var(--font-text);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .section-title {
            font-family: var(--font-display);
            font-size: 34px;
            font-weight: 700;
            line-height: 1.15;
            margin: 0 0 16px 0;
            color: var(--ink);
        }
        .section-body {
            font-family: var(--font-text);
            font-size: 14px;
            color: var(--ink-muted);
            line-height: 1.75;
        }

        /* ── TILE BASES ── */
        .tile-light    { background: var(--white);    padding: var(--spacing-section) 24px; }
        .tile-parchment { background: var(--parchment); padding: var(--spacing-section) 24px; }

        /* ── SOBRE ── */
        /* A section#sobre usa tile-parchment; o layout interno é flexbox */
        #sobre {
            display: flex;
            justify-content: center;
        }
        #sobre > .about-text,
        #sobre > .about-img {
            /* evita que os filhos diretos se comportem errado */
        }
        /* wrapper interno gerado pelo Yew é direto no section,
           então fazemos o section mesmo ser o flex container */
        #sobre {
            gap: 48px;
            align-items: center;
        }
        .about-text {
            flex: 1;
            max-width: 520px;
            text-align: left;
        }
        .about-img {
            flex-shrink: 0;
            width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .about-image-inner {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--hairline);
            display: block;
        }

        /* ── AREAS ── */
        #areas { text-align: center; }
        .areas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin: 0 auto;
            max-width: 1080px;
        }
        .area-card {
            background: var(--white);
            border: 0.5px solid var(--hairline);
            border-radius: var(--radius);
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            text-align: left;
        }
        .area-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        .area-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .area-card:hover::before { opacity: 1; }
        .area-icon {
            width: 40px; height: 40px;
            background: rgba(184, 150, 90, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }
        .area-icon img { max-width: 24px; max-height: 24px; }
        .area-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 8px 0;
        }
        .area-desc {
            font-family: var(--font-text);
            font-size: 12px;
            color: var(--ink-muted);
            line-height: 1.6;
        }

        /* ── EQUIPE ── */
        #equipe { text-align: center; }
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin: 0 auto;
            max-width: 1080px;
        }
        .team-card {
            background: var(--parchment);
            border: 0.5px solid var(--hairline);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .team-card:hover { transform: translateY(-2px); border-color: var(--gold-light); }
        .team-avatar {
            width: 84px; height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            overflow: hidden;
        }
        .team-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .team-name {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
        }
        .team-role {
            font-family: var(--font-text);
            font-size: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 5px;
        }
        .team-desc {
            font-family: var(--font-text);
            font-size: 13px;
            color: var(--ink-muted);
            margin-top: 12px;
            line-height: 1.65;
        }
        .team-links {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 18px;
        }
        .team-link {
            font-family: var(--font-text);
            font-size: 11px;
            color: var(--gold);
            text-decoration: none;
            border: 0.5px solid var(--gold);
            padding: 5px 16px;
            border-radius: 20px;
            transition: background 0.2s, color 0.2s;
        }
        .team-link:hover { background: var(--gold); color: var(--white); }

        /* ── INTEGRIDADE ── */
        #integridade { text-align: center; }
        #integridade .section-body {
            max-width: 620px;
            margin: 0 auto 28px;
        }

        /* ── ESTATÍSTICAS ── */
        #estatisticas { text-align: center; }
        /* Reutiliza areas-grid; cards com fundo parchment */
        #estatisticas .area-card {
            background: var(--parchment);
            text-align: center;
        }
        #estatisticas .area-title {
            font-size: 28px;
            color: var(--gold);
        }
        #estatisticas .area-desc {
            font-size: 13px;
        }

        /* ── CONTATO ── */
        #contato {
            background: var(--ink) !important;
            text-align: center;
        }
        #contato .section-header { text-align: center; }
        #contato .section-title { color: var(--white); }
        #contato .section-eyebrow { color: var(--gold); }
        .contact-sub {
            font-family: var(--font-lead);
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 28px;
        }
        .contact-grid {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }
        .contact-item {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 16px 22px;
            text-align: left;
            flex: 1;
            min-width: 200px;
        }
        .contact-item-lbl {
            font-family: var(--font-text);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 5px;
        }
        .contact-item-val {
            font-family: var(--font-text);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            display: inline-block;
            background: var(--gold);
            color: var(--white);
            padding: 13px 30px;
            border-radius: var(--rounded-pill);
            font-family: var(--font-text);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-primary:hover  { background: var(--gold-dark); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-ghost {
            display: inline-block;
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            padding: 13px 30px;
            border-radius: var(--rounded-pill);
            border: 1px solid rgba(255, 255, 255, 0.25);
            font-family: var(--font-text);
            font-size: 14px;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-ghost:hover { border-color: var(--white); color: var(--white); }

        /* ── FOOTER ── */
        .footer {
            background: #080808;
            padding: 32px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 0.5px solid rgba(255, 255, 255, 0.07);
        }
        .footer-copy {
            font-family: var(--font-text);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
        .social-links { display: flex; gap: 16px; }
        .social-icon {
            font-family: var(--font-text);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .social-icon:hover { color: var(--gold); }

        /* ── ANIMAÇÕES ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInContent {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseOrb {
            0%,  100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1);   }
            50%        { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
        }
        .fade-in-content { animation: fadeInContent 0.5s ease-out both; }
        .animate-card    { animation: slideIn 0.55s ease-out both; opacity: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 735px) {
            .main-nav-links a.text-link { display: none; }
            .hero-title   { font-size: 36px; }
            .hero-sub     { font-size: 17px; }
            .section-title { font-size: 26px; }
            .stats-strip  { flex-wrap: wrap; gap: 24px; padding: 24px; }
            #sobre        { flex-direction: column; text-align: center; }
            .about-text   { text-align: center; max-width: 100%; }
            .about-img    { width: 100%; }
            .areas-grid   { grid-template-columns: 1fr; }
            .team-grid    { grid-template-columns: 1fr; }
            .contact-grid { flex-direction: column; }
            .footer       { flex-direction: column; gap: 14px; text-align: center; }
        }
    </style>
